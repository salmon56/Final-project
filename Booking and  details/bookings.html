<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Ride</title>
    <link rel="stylesheet" href="booking.css">
</head> 
<body>

    <section class="booking-form">
        <h2>Make your trip</h2>
        <form>
            <div class="form-group">
                <label for="pickup-location">Pick-up Location</label>
                <input type="text" id="pickup-location" placeholder="City, Airport, Station, etc." required>
            </div>
            <div class="form-group">
                <label for="drop-off-location">Drop-off Location</label>
                <input type="text" id="drop-off-location" placeholder="City, Airport, Station, etc." required>
            </div>
            <div class="form-group">
                <label for="pickup-date">Pick-up Date</label>
                <input type="date" id="pickup-date" required>
            </div>
            <div class="form-group">
                <label for="drop-off-date">Drop-off Date</label>
                <input type="date" id="drop-off-date" required>
            </div>
            <div class="form-group">
                <label for="pickup-time">Pick-up Time</label>
                <input type="time" id="pickup-time" required>
            </div>
            <button type="submit">Search Vehicle</button>
        </form>
    </section>

</body>
</html>
