<body>
    <header class="hero-section">
        <nav>
            <div class="logo">
                <h1>AUTO<span class="highlight">ROAD</span></h1>
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="About us.html">About</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="cars.html">Our Car</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="hero-content">
            <h1>Now</h1>
            <h1>It's easy for you</h1>
            <h1>to rent a car</h1>
            <p>A small river named Duden flows by their place and supplies<br> it with the necessary regelialia. It is a paradisematic country, in <br> which roasted parts...</p>
            <button>Easy steps for renting a car</button>
        </div>
    </header>

    <section class="booking-form">
        <h2>Make your trip</h2>
        <form>
            <div class="form-group">
                <label for="pickup-location">Pick-up Location</label>
                <input type="text" id="pickup-location" placeholder="City, Airport, Station, etc." required>
            </div>
            <div class="form-group">
                <label for="drop-off-location">Drop-off Location</label>
                <input type="text" id="drop-off-location" placeholder="City, Airport, Station, etc." required>
            </div>
            <div class="form-group">
                <label for="pickup-date">Pick-up Date</label>
                <input type="date" id="pickup-date" required>
            </div>
            <div class="form-group">
                <label for="drop-off-date">Drop-off Date</label>
                <input type="date" id="drop-off-date" required>
            </div>
            <div class="form-group">
                <label for="pickup-time">Pick-up Time</label>
                <input type="time" id="pickup-time" required>
            </div>
            <button type="submit">Search Vehicle</button>
        </form>
    </section>
</body>
